
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankine Compressible Flow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin-bottom: 40px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="text"]:focus-visible, input[type="number"]:focus-visible {
            outline: 2px solid #0070f3;
            outline-offset: 2px;
            border-color: #0070f3;
        }
        button {
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0051a2; }
        button:focus-visible {
            outline: 2px solid #0070f3;
            outline-offset: 2px;
        }
        button:disabled, button[aria-disabled="true"] {
            background-color: #ccc;
            cursor: not-allowed;
            color: #666;
        }
        img { max-width: 100%; height: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rankine Compressible Flow</h1>
        <p>A high-performance Python library for analytic and semi-analytic compressible flow calculations.</p>

        <div class="section" id="nozzle">
            <h2>Quasi-1D Nozzle Flow</h2>
            <form action="/plot/nozzle#nozzle" method="post">
                <label for="P0">Stagnation Pressure P0 (Pa): <small>Must be non-negative</small></label>
                <input type="number" id="P0" name="P0" min="0" value="101325" required>
                <label for="back_pressure">Back Pressure (Pa): <small>Must be non-negative</small></label>
                <input type="number" id="back_pressure" name="back_pressure" min="0" value="95000" required>
                <label for="A_throat">Throat Area (m2): <small>Must be non-negative</small></label>
                <input type="number" id="A_throat" name="A_throat" min="0" step="0.01" value="0.05" required>
                <label for="A_exit">Exit Area (m2): <small>Must be non-negative</small></label>
                <input type="number" id="A_exit" name="A_exit" min="0" step="0.01" value="0.1" required>
                <button type="submit" aria-live="polite">Calculate & Plot</button>
            </form>
            {% if nozzle_plot %}
            <img src="data:image/png;base64,{{ nozzle_plot }}" alt="Nozzle Plot">
            {% endif %}
        </div>

        <div class="section" id="shock-polar">
            <h2>Oblique Shock Polar</h2>
            <form action="/plot/shock_polar#shock-polar" method="post">
                <label for="machs">Mach Numbers (comma separated): <small>Max 10 numbers, max 100 characters</small></label>
                <input type="text" id="machs" name="machs" maxlength="100" pattern="^\s*\d+(\.\d+)?\s*(,\s*\d+(\.\d+)?\s*){0,9}$" title="Please enter up to 10 comma-separated positive numbers (e.g., 2.0, 3.0)" value="2.0, 3.0, 5.0" required>
                <button type="submit" aria-live="polite">Generate Polar</button>
            </form>
            {% if polar_plot %}
            <img src="data:image/png;base64,{{ polar_plot }}" alt="Shock Polar">
            {% endif %}
        </div>

        <div class="section" id="shock-tube">
            <h2>Sod Shock Tube (Unsteady)</h2>
            <form action="/plot/shock_tube#shock-tube" method="post">
                <label for="time">Time (s): <small>Must be non-negative</small></label>
                <input type="number" id="time" name="time" min="0" step="0.01" value="0.25" required>
                <button type="submit" aria-live="polite">Simulate</button>
            </form>
            {% if tube_plot %}
            <img src="data:image/png;base64,{{ tube_plot }}" alt="Shock Tube Plot">
            {% endif %}
        </div>
    </div>
    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function(e) {
                const btn = this.querySelector('button[type="submit"], button:not([type="button"])');
                if(btn) {
                    if (btn.getAttribute('aria-disabled') === 'true') {
                        e.preventDefault();
                        return;
                    }
                    setTimeout(() => {
                        btn.setAttribute('aria-disabled', 'true');
                        btn.innerText = 'Calculating...';
                    }, 0);
                }
            });
        });
    </script>
</body>
</html>
