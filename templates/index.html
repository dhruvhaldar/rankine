
<!DOCTYPE html>
<html>
<head>
    <title>Rankine Compressible Flow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin-bottom: 40px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #0070f3; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0051a2; }
        img { max-width: 100%; height: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rankine Compressible Flow</h1>
        <p>A high-performance Python library for analytic and semi-analytic compressible flow calculations.</p>

        <div class="section">
            <h2>Quasi-1D Nozzle Flow</h2>
            <form action="/plot/nozzle" method="post">
                <label>Stagnation Pressure P0 (Pa):</label>
                <input type="number" name="P0" value="101325">
                <label>Back Pressure (Pa):</label>
                <input type="number" name="back_pressure" value="95000">
                <label>Throat Area (m2):</label>
                <input type="number" name="A_throat" step="0.01" value="0.05">
                <label>Exit Area (m2):</label>
                <input type="number" name="A_exit" step="0.01" value="0.1">
                <button type="submit">Calculate & Plot</button>
            </form>
            {% if nozzle_plot %}
            <img src="data:image/png;base64,{{ nozzle_plot }}" alt="Nozzle Plot">
            {% endif %}
        </div>

        <div class="section">
            <h2>Oblique Shock Polar</h2>
            <form action="/plot/shock_polar" method="post">
                <label>Mach Numbers (comma separated):</label>
                <input type="text" name="machs" value="2.0, 3.0, 5.0">
                <button type="submit">Generate Polar</button>
            </form>
            {% if polar_plot %}
            <img src="data:image/png;base64,{{ polar_plot }}" alt="Shock Polar">
            {% endif %}
        </div>

        <div class="section">
            <h2>Sod Shock Tube (Unsteady)</h2>
            <form action="/plot/shock_tube" method="post">
                <label>Time (s):</label>
                <input type="number" name="time" step="0.01" value="0.25">
                <button type="submit">Simulate</button>
            </form>
            {% if tube_plot %}
            <img src="data:image/png;base64,{{ tube_plot }}" alt="Shock Tube Plot">
            {% endif %}
        </div>
    </div>
</body>
</html>
